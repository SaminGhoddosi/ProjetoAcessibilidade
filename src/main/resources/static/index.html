<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas Acessíveis</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
    <h1>Rotas Acessíveis</h1>
    <p>Encontre o melhor caminho para seu destino.</p>

    <form id="form-rota">

        <div class="form-group">
            <label for="ponto-partida">De onde você sai?</label>
            <div class="autocomplete-wrapper">
                <input type="text" id="ponto-partida" placeholder="Ex: Prefeitura de Blumenau" required autocomplete="off">
                <div class="autocomplete-items-container" id="partida-sugestoes"></div>
            </div>
        </div>

        <div class="form-group">
            <label for="ponto-destino">Para onde você vai?</label>
            <div class="autocomplete-wrapper">
                <input type="text" id="ponto-destino" placeholder="Ex: Rua Ingo Hering, 20" required autocomplete="off">
                <div class="autocomplete-items-container" id="destino-sugestoes"></div>
            </div>
        </div>

        <div class="form-group">
            <label for="perfil-usuario">Qual seu perfil de locomoção?</label>
            <select id="perfil-usuario">
                <option value="pedestrian">Pedestre (Padrão)</option>
                <option value="wheelchair">Cadeirante</option>
                <option value="pedestrian_avoid_stairs">Idoso (Evitar escadas)</option>
            </select>
        </div>
        <button type="submit" id="btn-buscar-rota">Buscar Rota</button>
    </form>

    <div id="map"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="script.js"></script>
</body>
</html>
